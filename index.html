<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جولك تهكر؟ 😄</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Cairo', system-ui, sans-serif;
      padding: 1rem;
    }

    .card {
      max-width: 600px;
      width: 100%;
      background: rgba(22, 28, 46, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 3.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(120, 200, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
      text-align: center;
    }

    .card:hover {
      box-shadow: 0 30px 60px rgba(0, 20, 40, 0.9), 0 0 0 3px rgba(0, 200, 255, 0.3);
    }

    .icon-hacker {
      font-size: 4.2rem;
      margin-bottom: 0.5rem;
      display: inline-block;
      animation: float 3.5s ease-in-out infinite;
      filter: drop-shadow(0 8px 12px rgba(0, 150, 255, 0.3));
    }

    @keyframes float {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-12px) scale(1.05); }
      100% { transform: translateY(0px) scale(1); }
    }

    h1 {
      color: #b3e4ff;
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(0, 180, 255, 0.5);
      margin-bottom: 0.35rem;
      word-break: break-word;
    }

    .sub-title {
      color: #8bb3d9;
      font-size: 1.2rem;
      font-weight: 400;
      opacity: 0.9;
      margin-bottom: 1.8rem;
      border-bottom: 1px dashed rgba(100, 200, 255, 0.25);
      padding-bottom: 1rem;
    }

    .joke-box {
      background: rgba(0, 20, 40, 0.5);
      border-radius: 3rem;
      padding: 1.2rem 1.8rem;
      margin: 1.8rem 0 2.2rem;
      border-left: 5px solid #00d0ff;
      box-shadow: inset 0 0 20px rgba(0, 100, 200, 0.1);
      backdrop-filter: blur(4px);
    }

    .joke-text {
      font-size: 1.7rem;
      font-weight: 500;
      color: #e0f2ff;
      line-height: 1.5;
      word-break: break-word;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .joke-text span {
      background: rgba(0, 200, 255, 0.1);
      padding: 0.1rem 0.8rem;
      border-radius: 40px;
      font-size: 1.8rem;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .btn {
      background: rgba(20, 40, 70, 0.7);
      border: none;
      padding: 0.9rem 2.2rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #d6edff;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(100, 200, 255, 0.2);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
      transition: 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.3px;
      flex: 1 1 auto;
      justify-content: center;
    }

    .btn-primary {
      background: #0066cc;
      background: linear-gradient(145deg, #0077ff, #0055bb);
      border: 1px solid #4ab3ff;
      color: white;
      box-shadow: 0 0 20px rgba(0, 120, 255, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(145deg, #1a8aff, #0066dd);
      transform: scale(1.02);
      box-shadow: 0 0 30px #0080ff80;
      border-color: #8acbff;
    }

    .btn-secondary {
      background: rgba(40, 60, 90, 0.6);
      border-color: rgba(200, 200, 255, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(70, 100, 150, 0.7);
      transform: scale(1.02);
      border-color: rgba(200, 230, 255, 0.4);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .footer-meta {
      margin-top: 2.8rem;
      font-size: 0.95rem;
      color: #6a8baa;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(0, 180, 255, 0.08);
      padding: 0.3rem 1.2rem;
      border-radius: 30px;
      border: 1px solid rgba(0, 180, 255, 0.1);
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .badge i {
      font-style: normal;
      display: inline-block;
      animation: wink 2s infinite;
    }

    @keyframes wink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 480px) {
      .card { padding: 1.8rem 1.2rem; border-radius: 2.5rem; }
      h1 { font-size: 2.1rem; }
      .joke-text { font-size: 1.4rem; }
      .btn { font-size: 1rem; padding: 0.7rem 1.2rem; }
      .icon-hacker { font-size: 3.2rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- أيقونة "هاكر" -->
    <div class="icon-hacker">🧑‍💻</div>

    <h1>جولك تهكر؟</h1>
    <div class="sub-title">✨ سكربت المزح التقني ✨</div>

    <!-- منطقة النكتة / الرسالة -->
    <div class="joke-box">
      <div class="joke-text" id="jokeDisplay">
        <span>🤖</span> انقر فوق الزر 👇
      </div>
    </div>

    <!-- أزرار التفاعل -->
    <div class="btn-group">
      <button class="btn btn-primary" id="hackBtn">
        <span>⚡</span> تهكر 😈
      </button>
      <button class="btn btn-secondary" id="resetBtn">
        <span>🔄</span> رجّع المزح
      </button>
    </div>

    <!-- تذييل مع جملة "أمزح معك يا صديقي" -->
    <div class="footer-meta">
      <span class="badge">💬 <i>أمزح معك يا صديقي</i></span>
      <span class="badge">🛡️ #للضحك_فقط</span>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // مصدر النكات (جمل المزح) 
      const jokes = [
        "🧠 جارٍ اختراق عقلك... تم! أنت الآن تفكر بلغة البايثون 🐍",
        "📡 جارٍ رفع مستوى التهكير... اكتمل! أنت هاكر من الدرجة الخامسة 😎",
        "💾 تم اختراق ملفاتك السرية... وجدنا قائمة مشترياتك من البقالة 🛒",
        "🖥️ نظامك تحت السيطرة... لكننا وجدنا صور قطط فقط 🐱",
        "🔓 كلمة المرور الخاصة بك هي: 123456... أمزح معك يا صديقي 😂",
        "⚙️ تهكير ناجح! لكننا أعدنا ضبط كل شيء كما كان ✨",
        "📀 جارٍ تنزيل رامات إضافية... مزحة! بس نزلنا كوب قهوة ☕",
        "🎮 تم تفعيل وضع الجوكر... هاهاها، بس أمزح معك يا صديقي 🤡",
        "🔐 حسابك آمن 100%... لكننا غيرنا خلفية سطح المكتب إلى صور ديناصورات 🦕",
        "🧩 اختراق وهمي بنسبة 99%... الـ 1% المتبقية هي ابتسامتك 😄"
      ];

      // العناصر
      const jokeDisplay = document.getElementById('jokeDisplay');
      const hackBtn = document.getElementById('hackBtn');
      const resetBtn = document.getElementById('resetBtn');

      // متغير لتخزين آخر نكتة تم عرضها (لتجنب التكرار المتتالي)
      let lastJokeIndex = -1;

      // دالة اختيار نكتة عشوائية (مع تجنب تكرار نفس النكتة مرتين متتاليتين)
      function getRandomJoke() {
        if (jokes.length === 0) return "😅 لا توجد نكات... أمزح معك يا صديقي!";
        if (jokes.length === 1) return jokes[0];

        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * jokes.length);
        } while (newIndex === lastJokeIndex);
        
        lastJokeIndex = newIndex;
        return jokes[newIndex];
      }

      // دالة تحديث النكتة مع تأثير بسيط
      function updateJoke(text) {
        // إضافة رمز تحميل وهمي لمتعة بصرية
        jokeDisplay.style.transition = 'opacity 0.15s';
        jokeDisplay.style.opacity = '0.5';
        
        setTimeout(() => {
          // نضع النص مع أيقونة مرحة في البداية (اختياري)
          // لكننا نحافظ على الأيقونة الموجودة في النص نفسه (من الجمل)
          jokeDisplay.innerHTML = text;
          jokeDisplay.style.opacity = '1';
        }, 120);
      }

      // حدث زر "تهكر" 😈
      function handleHack() {
        const randomJoke = getRandomJoke();
        // نضيف لمسة: في بعض الأحيان نضع كلمة "تهكر" قبل النكتة
        // لكن الجمل تحتوي بالفعل على نكات, نتركها كما هي
        updateJoke(randomJoke);
      }

      // حدث زر "رجّع المزح" (يعرض رسالة ثابتة أو نكتة محددة)
      function handleReset() {
        // نعرض جملة "أمزح معك يا صديقي" بشكل واضح مع لمسة
        const resetMessage = `🤝 أمزح معك يا صديقي ... اضغط "تهكر" للضحك 😄`;
        updateJoke(resetMessage);
        // إعادة تعيين lastJokeIndex ليسمح بتكرار أي نكتة بعد reset
        lastJokeIndex = -1;
      }

      // إضافة مستمعات الأحداث
      hackBtn.addEventListener('click', handleHack);
      resetBtn.addEventListener('click', handleReset);

      // عند تحميل الصفحة نعرض رسالة ترحيبية (مزج بين الترحيب واللمسة)
      window.addEventListener('DOMContentLoaded', function() {
        // نعرض رسالة افتتاحية لطيفة
        const welcomeMsg = `👋 أهلاً! اضغط "تهكر" ... أمزح معك يا صديقي 🤗`;
        jokeDisplay.innerHTML = welcomeMsg;
        // نجعل lastJokeIndex = -1 عادي
        lastJokeIndex = -1;
      });

      // اختياري: إضافة تأثير كتابة عند الضغط (مجرد تحسين بسيط)
      // لكننا نكتفي بالتأثير الموجود

      console.log('✅ سكربت المزح جاهز! - #أمزح_معك_يا_صديقي');
    })();
  </script>
</body>
</html>
