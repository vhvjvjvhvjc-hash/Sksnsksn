<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>خدع بصرية 🔮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0e1a, #1a1f2f);
            color: #eee;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 30px 50px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 150, 0.06);
            border: 1px solid rgba(255, 215, 150, 0.08);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #f0d8b0;
            text-shadow: 0 0 30px rgba(200, 150, 70, 0.2);
            margin-bottom: 10px;
        }

        .sub {
            color: #a09080;
            margin-bottom: 40px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 25px 20px 30px;
            border: 1px solid rgba(255, 215, 150, 0.06);
            transition: 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 215, 150, 0.15);
            transform: translateY(-6px);
        }

        .card h3 {
            color: #d4c0a8;
            font-weight: 400;
            margin-bottom: 16px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .canvas-box {
            background: #11141f;
            border-radius: 20px;
            padding: 10px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
            margin-bottom: 14px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 14px;
            background: #11141f;
            cursor: pointer;
        }

        .desc {
            font-size: 0.85rem;
            color: #887a6a;
            line-height: 1.6;
            margin-top: 6px;
        }

        .btn-reset {
            background: rgba(200, 150, 70, 0.12);
            border: 1px solid rgba(255, 215, 150, 0.2);
            color: #d4c0a8;
            padding: 12px 36px;
            border-radius: 40px;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(4px);
            font-family: inherit;
        }

        .btn-reset:hover {
            background: rgba(200, 150, 70, 0.25);
            border-color: #f0d8a8;
            box-shadow: 0 0 30px rgba(200, 150, 70, 0.15);
        }

        .footer {
            margin-top: 40px;
            color: #5a4e40;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            background: rgba(200, 150, 70, 0.08);
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #a09080;
            border: 1px solid rgba(255, 215, 150, 0.06);
        }

        @media (max-width: 700px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 20px; }
            .grid { gap: 20px; }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🔮 خدع بصرية</h1>
    <div class="sub">— حرّك عينيك وانظر كيف تخدعك العقل —</div>

    <div class="grid">

        <!-- 1. تموج متحرك -->
        <div class="card">
            <h3>🌀 دوائر تدور</h3>
            <div class="canvas-box">
                <canvas id="c1" width="400" height="300"></canvas>
            </div>
            <div class="desc">دوائر تتحرك وكأنها تتدحرج — لكنها ثابتة.</div>
        </div>

        <!-- 2. خطوط متعرجة -->
        <div class="card">
            <h3>📏 خطوط منحنية</h3>
            <div class="canvas-box">
                <canvas id="c2" width="400" height="300"></canvas>
            </div>
            <div class="desc">خطوط مستقيمة تبدو منحنية بسبب الخلفية.</div>
        </div>

        <!-- 3. مربع يختفي -->
        <div class="card">
            <h3>◻️ نقاط سوداء</h3>
            <div class="canvas-box">
                <canvas id="c3" width="400" height="300"></canvas>
            </div>
            <div class="desc">ركز على نقطة — النقاط الأخرى تتلاشى!</div>
        </div>

        <!-- 4. صورة مقلوبة -->
        <div class="card">
            <h3>👤 وجه مزدوج</h3>
            <div class="canvas-box">
                <canvas id="c4" width="400" height="300"></canvas>
            </div>
            <div class="desc">وجه أم جهة؟ الدماغ يقرر.</div>
        </div>

    </div>

    <button class="btn-reset" onclick="resetAll()">⟳ إعادة ضبط</button>

    <div class="footer">
        <span class="badge">🧠 خدع بصرية</span>
        &nbsp;—&nbsp; صممها <strong>أحمد السوري</strong> &nbsp;•&nbsp; 2026
    </div>

</div>

<script>
    // ═══════════ 1. دوائر تدور ═══════════
    const c1 = document.getElementById('c1');
    const ctx1 = c1.getContext('2d');
    let rot = 0;

    function drawCircles() {
        const w = c1.width, h = c1.height;
        ctx1.clearRect(0, 0, w, h);

        const cx = w/2, cy = h/2, r = 110;
        const count = 12;
        for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2 + rot;
            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;
            ctx1.beginPath();
            ctx1.arc(x, y, 22, 0, Math.PI * 2);
            ctx1.fillStyle = `hsl(${i * 25 + rot * 20}, 60%, 55%)`;
            ctx1.fill();
            ctx1.shadowColor = 'rgba(255,215,150,0.15)';
            ctx1.shadowBlur = 20;
        }

        // مركز ثابت
        ctx1.beginPath();
        ctx1.arc(cx, cy, 18, 0, Math.PI * 2);
        ctx1.fillStyle = '#f0d8a8';
        ctx1.shadowBlur = 30;
        ctx1.fill();
        ctx1.shadowBlur = 0;

        rot += 0.015;
        requestAnimationFrame(drawCircles);
    }
    drawCircles();

    // ═══════════ 2. خطوط منحنية ═══════════
    const c2 = document.getElementById('c2');
    const ctx2 = c2.getContext('2d');

    function drawWavy() {
        const w = c2.width, h = c2.height;
        ctx2.clearRect(0, 0, w, h);

        // خلفية متدرجة
        const grad = ctx2.createRadialGradient(w/2, h/2, 20, w/2, h/2, 220);
        grad.addColorStop(0, '#1e2638');
        grad.addColorStop(1, '#0b0e18');
        ctx2.fillStyle = grad;
        ctx2.fillRect(0, 0, w, h);

        // شبكة من المربعات الصغيرة
        const step = 28;
        for (let x = 0; x < w; x += step) {
            for (let y = 0; y < h; y += step) {
                const dx = x - w/2, dy = y - h/2;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const phase = Math.sin(dist * 0.045 - Date.now() * 0.0006) * 8;
                ctx2.fillStyle = `hsla(${40 + dist * 0.2}, 50%, ${55 + Math.sin(dist * 0.04) * 12}%, 0.7)`;
                ctx2.fillRect(x + phase * 0.4, y + phase * 0.3, 5, 5);
            }
        }

        // خطوط مستقيمة
        ctx2.strokeStyle = 'rgba(255,215,150,0.08)';
        ctx2.lineWidth = 1;
        for (let i = 0; i < 18; i++) {
            const y = 20 + i * 16;
            ctx2.beginPath();
            ctx2.moveTo(10, y);
            ctx2.lineTo(w - 10, y + Math.sin(i * 0.5 + Date.now() * 0.0004) * 6);
            ctx2.stroke();
        }

        requestAnimationFrame(drawWavy);
    }
    drawWavy();

    // ═══════════ 3. نقاط سوداء ═══════════
    const c3 = document.getElementById('c3');
    const ctx3 = c3.getContext('2d');

    function drawDots() {
        const w = c3.width, h = c3.height;
        ctx3.clearRect(0, 0, w, h);
        ctx3.fillStyle = '#141a28';
        ctx3.fillRect(0, 0, w, h);

        const cols = 12, rows = 9;
        const spacingX = (w - 40) / (cols - 1);
        const spacingY = (h - 40) / (rows - 1);

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x = 20 + c * spacingX;
                const y = 20 + r * spacingY;
                const isCenter = (r === Math.floor(rows/2) && c === Math.floor(cols/2));
                const size = isCenter ? 8 : 5;
                ctx3.beginPath();
                ctx3.arc(x, y, size, 0, Math.PI * 2);
                ctx3.fillStyle = isCenter ? '#f0d8a8' : '#1a1f2f';
                ctx3.fill();
                ctx3.shadowColor = isCenter ? 'rgba(255,215,150,0.3)' : 'rgba(0,0,0,0)';
                ctx3.shadowBlur = isCenter ? 20 : 0;
            }
        }

        // نقاط بيضاء صغيرة متحركة
        for (let i = 0; i < 40; i++) {
            const px = 30 + Math.sin(i * 0.7 + Date.now() * 0.0008) * (w/2 - 30);
            const py = 30 + Math.cos(i * 0.5 + Date.now() * 0.0006) * (h/2 - 30);
            ctx3.beginPath();
            ctx3.arc(px, py, 2, 0, Math.PI * 2);
            ctx3.fillStyle = 'rgba(255,255,255,0.08)';
            ctx3.fill();
        }

        requestAnimationFrame(drawDots);
    }
    drawDots();

    // ═══════════ 4. وجه مزدوج ═══════════
    const c4 = document.getElementById('c4');
    const ctx4 = c4.getContext('2d');

    function drawFace() {
        const w = c4.width, h = c4.height;
        ctx4.clearRect(0, 0, w, h);
        ctx4.fillStyle = '#111520';
        ctx4.fillRect(0, 0, w, h);

        const cx = w/2, cy = h/2;

        // شكل الوجه (إناء / وجه)
        ctx4.fillStyle = '#d4c0a8';
        ctx4.beginPath();
        // الجانب الأيمن (أنف وفم)
        ctx4.moveTo(cx + 10, cy - 70);
        ctx4.quadraticCurveTo(cx + 80, cy - 50, cx + 70, cy + 20);
        ctx4.quadraticCurveTo(cx + 50, cy + 50, cx + 10, cy + 40);
        // الجانب الأيسر (وجه آخر)
        ctx4.quadraticCurveTo(cx - 50, cy + 50, cx - 70, cy + 20);
        ctx4.quadraticCurveTo(cx - 80, cy - 50, cx - 10, cy - 70);
        ctx4.closePath();
        ctx4.fill();

        // عينان
        ctx4.fillStyle = '#0b0e18';
        ctx4.beginPath();
        ctx4.arc(cx - 30, cy - 20, 10, 0, Math.PI * 2);
        ctx4.fill();
        ctx4.beginPath();
        ctx4.arc(cx + 30, cy - 20, 10, 0, Math.PI * 2);
        ctx4.fill();

        // أنف
        ctx4.strokeStyle = '#0b0e18';
        ctx4.lineWidth = 2;
        ctx4.beginPath();
        ctx4.moveTo(cx, cy - 5);
        ctx4.lineTo(cx, cy + 15);
        ctx4.stroke();

        // فم
        ctx4.beginPath();
        ctx4.arc(cx, cy + 28, 18, 0, Math.PI);
        ctx4.stroke();

        // تأثير توهج
        const grad = ctx4.createRadialGradient(cx, cy, 20, cx, cy, 150);
        grad.addColorStop(0, 'rgba(200,150,70,0.05)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx4.fillStyle = grad;
        ctx4.fillRect(0, 0, w, h);

        requestAnimationFrame(drawFace);
    }
    drawFace();

    // ═══════════ إعادة ضبط ═══════════
    function resetAll() {
        rot = 0;
        // مجرد إعادة تشغيل الحركات
    }
</script>

</body>
</html>
