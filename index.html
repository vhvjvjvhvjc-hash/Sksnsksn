<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 لعبة تخمين الرقم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 40px 35px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: 0.3s;
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 8px;
            color: #f5c842;
            text-shadow: 0 0 20px rgba(245, 200, 66, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sub {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 15px;
        }

        .range-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .range-box span {
            font-size: 1.6rem;
            font-weight: bold;
            color: #f5c842;
            margin: 0 8px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            font-size: 1.2rem;
            outline: none;
            transition: 0.3s;
            min-width: 120px;
        }

        .input-group input:focus {
            border-color: #f5c842;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 25px rgba(245, 200, 66, 0.1);
        }

        .input-group input::placeholder {
            color: #888;
            font-size: 0.9rem;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: #f5c842;
            color: #1a1a2e;
            flex: 1;
            min-width: 100px;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(245, 200, 66, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        .btn-danger {
            background: #e74c5e;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c0392b;
            box-shadow: 0 8px 30px rgba(231, 76, 94, 0.3);
        }

        .message {
            padding: 16px;
            border-radius: 14px;
            margin: 15px 0;
            font-size: 1.1rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .message.win {
            background: rgba(46, 213, 115, 0.15);
            border-color: #2ed573;
            color: #2ed573;
        }

        .message.lose {
            background: rgba(231, 76, 94, 0.15);
            border-color: #e74c5e;
            color: #e74c5e;
        }

        .message.hint {
            background: rgba(245, 200, 66, 0.1);
            border-color: #f5c842;
            color: #f5c842;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            color: #aaa;
            flex-wrap: wrap;
            gap: 5px;
        }

        .stats span {
            color: #fff;
            font-weight: bold;
        }

        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }

        .history .badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history .badge.low {
            border-color: rgba(52, 152, 219, 0.3);
            color: #5dade2;
        }

        .history .badge.high {
            border-color: rgba(231, 76, 94, 0.3);
            color: #e74c5e;
        }

        .history .badge.correct {
            border-color: #2ed573;
            color: #2ed573;
            background: rgba(46, 213, 115, 0.15);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #666;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            h1 { font-size: 1.8rem; }
            .input-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎯 تخمين الرقم</h1>
        <div class="sub">خمن الرقم السري بين <span id="minDisplay">1</span> و <span id="maxDisplay">100</span></div>

        <div class="range-box">
            🔢 أدخل رقمك:
        </div>

        <div class="input-group">
            <input type="number" id="guessInput" placeholder="مثلاً 42" min="1" max="100">
            <button class="btn" id="guessBtn">✅ خمّن</button>
        </div>

        <div id="message" class="message">🎯 ابدأ التخمين!</div>

        <div class="stats">
            <div>🔄 المحاولات: <span id="attempts">0</span></div>
            <div>🎯 الرقم السري: <span id="secretDisplay">❓</span></div>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
            <button class="btn btn-secondary" id="newGameBtn">🔄 لعبة جديدة</button>
            <button class="btn btn-danger" id="resetBtn">🗑️ إعادة تعيين</button>
        </div>

        <div id="historyContainer">
            <div style="font-size: 0.85rem; color: #888; margin-bottom: 5px;">📜 تاريخ التخمينات:</div>
            <div class="history" id="historyList">
                <span style="color: #666; font-size: 0.85rem;">لا توجد تخمينات بعد</span>
            </div>
        </div>

        <div class="footer">🕹️ العب واستمتع | طور مهارات التخمين</div>
    </div>

    <script>
        // =============================================
        //  إعدادات اللعبة
        // =============================================
        const MIN = 1;
        const MAX = 100;

        let secretNumber = 0;
        let attempts = 0;
        let gameOver = false;
        let history = [];

        // =============================================
        //  عناصر DOM
        // =============================================
        const guessInput = document.getElementById('guessInput');
        const guessBtn = document.getElementById('guessBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const resetBtn = document.getElementById('resetBtn');
        const messageEl = document.getElementById('message');
        const attemptsEl = document.getElementById('attempts');
        const secretDisplay = document.getElementById('secretDisplay');
        const historyList = document.getElementById('historyList');
        const minDisplay = document.getElementById('minDisplay');
        const maxDisplay = document.getElementById('maxDisplay');

        // =============================================
        //  دوال اللعبة
        // =============================================
        function generateSecret() {
            return Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
        }

        function resetGame() {
            secretNumber = generateSecret();
            attempts = 0;
            gameOver = false;
            history = [];
            updateUI();
            messageEl.className = 'message';
            messageEl.textContent = '🎯 لعبة جديدة! ابدأ التخمين';
            guessInput.disabled = false;
            guessBtn.disabled = false;
            guessInput.value = '';
            guessInput.focus();
            secretDisplay.textContent = '❓';
        }

        function endGame(won) {
            gameOver = true;
            guessInput.disabled = true;
            guessBtn.disabled = true;
            secretDisplay.textContent = secretNumber;

            if (won) {
                messageEl.className = 'message win';
                messageEl.textContent = `🎉 مبروك! الرقم كان ${secretNumber} في ${attempts} محاولة! 🎉`;
            } else {
                messageEl.className = 'message lose';
                messageEl.textContent = `😢 انتهت المحاولات! الرقم كان ${secretNumber}`;
            }
        }

        function handleGuess() {
            if (gameOver) {
                messageEl.className = 'message';
                messageEl.textContent = '🔄 انتهت اللعبة! اضغط "لعبة جديدة" للعب مرة أخرى';
                return;
            }

            const rawValue = guessInput.value.trim();
            if (rawValue === '') {
                messageEl.className = 'message hint';
                messageEl.textContent = '⚠️ أدخل رقماً أولاً!';
                return;
            }

            const guess = Number(rawValue);
            if (isNaN(guess) || !Number.isInteger(guess)) {
                messageEl.className = 'message hint';
                messageEl.textContent = '⚠️ يرجى إدخال رقم صحيح';
                guessInput.value = '';
                return;
            }

            if (guess < MIN || guess > MAX) {
                messageEl.className = 'message hint';
                messageEl.textContent = `⚠️ الرقم يجب أن يكون بين ${MIN} و ${MAX}`;
                guessInput.value = '';
                return;
            }

            // ✅ تخمين صحيح
            attempts++;
            history.push(guess);
            guessInput.value = '';
            guessInput.focus();

            if (guess === secretNumber) {
                endGame(true);
                updateUI();
                return;
            }

            // ❌ تخمين خاطئ
            const isLow = guess < secretNumber;
            messageEl.className = 'message hint';
            messageEl.textContent = isLow
                ? `📈 الرقم ${guess} أقل من الرقم السري. زوّد!`
                : `📉 الرقم ${guess} أكبر من الرقم السري. نقّص!`;

            // حد أقصى 10 محاولات
            if (attempts >= 10) {
                endGame(false);
            }

            updateUI();
        }

        // =============================================
        //  تحديث الواجهة
        // =============================================
        function updateUI() {
            attemptsEl.textContent = attempts;

            // تحديث تاريخ التخمينات
            if (history.length === 0) {
                historyList.innerHTML = '<span style="color: #666; font-size: 0.85rem;">لا توجد تخمينات بعد</span>';
                return;
            }

            let html = '';
            history.forEach((num, index) => {
                let cls = 'badge';
                if (num === secretNumber && gameOver) cls += ' correct';
                else if (num < secretNumber) cls += ' low';
                else cls += ' high';
                html += `<span class="${cls}">#${index + 1}: ${num}</span>`;
            });
            historyList.innerHTML = html;
        }

        // =============================================
        //  الأحداث
        // =============================================
        guessBtn.addEventListener('click', handleGuess);

        guessInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleGuess();
            }
        });

        newGameBtn.addEventListener('click', resetGame);

        resetBtn.addEventListener('click', () => {
            if (confirm('🗑️ هل تريد حذف كل التخمينات وبدء لعبة جديدة؟')) {
                resetGame();
            }
        });

        // =============================================
        //  بدء اللعبة
        // =============================================
        minDisplay.textContent = MIN;
        maxDisplay.textContent = MAX;
        resetGame();
    </script>

</body>
</html>
