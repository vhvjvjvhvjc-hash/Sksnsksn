<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن الكريم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amiri', 'Traditional Arabic', serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b3a4b 100%);
            color: #e8d5b7;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,150,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: #f0d8a8;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(200,150,50,0.3);
        }
        .sub {
            text-align: center;
            color: #b8a080;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        select, button {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,215,150,0.3);
            background: rgba(255,255,255,0.08);
            color: #e8d5b7;
            margin-bottom: 15px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        select option {
            background: #1b2a3a;
            color: #e8d5b7;
        }
        select:focus, button:hover {
            border-color: #f0d8a8;
            background: rgba(255,215,150,0.15);
        }
        button {
            cursor: pointer;
            background: rgba(200,150,50,0.2);
            font-weight: bold;
            letter-spacing: 1px;
        }
        button:hover {
            background: rgba(200,150,50,0.35);
        }
        #ayaat {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border-right: 4px solid #f0d8a8;
            max-height: 450px;
            overflow-y: auto;
            line-height: 2.2;
            font-size: 1.3rem;
            text-align: right;
        }
        #ayaat .aya {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,215,150,0.08);
        }
        #ayaat .aya:last-child {
            border-bottom: none;
        }
        .aya-number {
            color: #f0d8a8;
            font-size: 0.8rem;
            background: rgba(200,150,50,0.2);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
        }
        .loader {
            text-align: center;
            color: #b8a080;
            padding: 30px;
        }
        .footer {
            margin-top: 25px;
            text-align: center;
            color: #6a5a4a;
            font-size: 0.8rem;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #f0d8a8; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 القرآن الكريم</h1>
        <div class="sub">— آيات وسور —</div>

        <select id="suraSelect">
            <option value="">📂 اختر السورة...</option>
        </select>

        <button id="loadBtn">📖 عرض الآيات</button>

        <div id="ayaat">
            <div class="loader">📚 اختر سورة ثم اضغط عرض</div>
        </div>

        <div class="footer">🕌 بسم الله الرحمن الرحيم</div>

            { id: 114, name: "الناس", verses: 6 }

        // ========== ملء القائمة ==========
        const select = document.getElementById('suraSelect');
        surahs.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = `${s.id} - ${s.name} (${s.verses})`;
            select.appendChild(opt);
        });

        // ========== جلب الآيات من API ==========
        async function loadAyahs(suraId) {
            const container = document.getElementById('ayaat');
            container.innerHTML = '<div class="loader">⏳ جاري التحميل...</div>';

            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${suraId}`);
                const data = await res.json();

                if (data.code === 200) {
                    const ayahs = data.data.ayahs;
                    let html = '';
                    ayahs.forEach(a => {
                        html += `<div class="aya">${a.text} <span class="aya-number">${a.numberInSurah}</span></div>`;
                    });
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="loader">❌ خطأ في التحميل</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="loader">⚠️ فشل الاتصال بالإنترنت</div>';
            }
        }

        // ========== الأزرار ==========
        document.getElementById('loadBtn').addEventListener('click', () => {
            const id = select.value;
            if (id) loadAyahs(parseInt(id));
            else {
                document.getElementById('ayaat').innerHTML = '<div class="loader">📂 اختر سورة أولاً</div>';
            }
        });

        // تحميل أول سورة تلقائياً عند فتح الصفحة
        window.onload = () => {
            select.value = '1';
            loadAyahs(1);
        };
    </script>
</body>
</html>
